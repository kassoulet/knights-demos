name: Build cochlea_gl

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cochlea_gl
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libmodplug-dev libglew-dev libglu1-mesa-dev
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build
