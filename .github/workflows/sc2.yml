name: Build sc2

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sc2
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get remove -y libsdl1.2-dev libgl-dev libglu-dev 2>/dev/null || true
          sudo apt-get install -y autoconf automake libtool nasm gcc-multilib
          sudo apt-get install -y libsdl1.2-dev:i386 libgl1-mesa-dev:i386 libglu1-mesa-dev:i386
      - name: Configure
        run: chmod +x autogen.sh && CFLAGS="-m32 -fcommon" ./autogen.sh && CFLAGS="-m32 -fcommon" ./configure
      - name: Build
        run: make
