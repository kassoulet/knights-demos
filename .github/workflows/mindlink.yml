name: Build mindlink

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mindlink
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl1.2-dev liballegro4-dev libmikmod-dev zlib1g-dev
      - name: Build
        run: make LOADLIBES="-lm"
